<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · El Hajj Consulting</title>
  <meta name="description" content="The page you're looking for doesn't exist on El Hajj Consulting." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/redesign.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--rd-sans-a);
      background: var(--rd-cream);
      color: var(--rd-ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .nf {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      max-width: 640px;
      margin: 0 auto;
    }
    .nf__mark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--rd-gold);
      margin-bottom: 40px;
    }
    .nf__eyebrow {
      font-family: var(--rd-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rd-gold);
      margin-bottom: 18px;
    }
    .nf__code {
      font-family: var(--rd-serif-a);
      font-size: clamp(96px, 16vw, 160px);
      line-height: 1;
      color: var(--rd-navy);
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    .nf__code em {
      color: var(--rd-clay);
      font-style: italic;
    }
    .nf__title {
      font-family: var(--rd-serif-a);
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 400;
      color: var(--rd-navy);
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }
    .nf__body {
      font-size: 17px;
      line-height: 1.55;
      color: var(--rd-ink-3);
      max-width: 460px;
      margin-bottom: 36px;
    }
    .nf__actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nf__btn {
      background: var(--rd-navy);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      transition: background 180ms, transform 180ms;
    }
    .nf__btn:hover {
      background: var(--rd-navy-500);
      transform: translateY(-1px);
    }
    .nf__btn--ghost {
      background: transparent;
      color: var(--rd-navy);
      border: 1px solid var(--rd-line);
    }
    .nf__btn--ghost:hover {
      background: var(--rd-stone-50);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<main class="nf">
  <span class="nf__mark">
    <svg width="28" height="28" viewBox="0 0 36 36" fill="none" aria-hidden="true">
      <path d="M 8 8 L 8 28" stroke="#0E1B33" stroke-width="2.4" stroke-linecap="square"/>
      <path d="M 28 8 L 28 28" stroke="#0E1B33" stroke-width="2.4" stroke-linecap="square"/>
      <line x1="8" y1="8"  x2="17" y2="8"  stroke="#C29036" stroke-width="1.6"/>
      <line x1="8" y1="28" x2="17" y2="28" stroke="#C29036" stroke-width="1.6"/>
      <line x1="8" y1="18" x2="28" y2="18" stroke="#C29036" stroke-width="1.8"/>
    </svg>
  </span>

  <div class="nf__eyebrow">Error · 404</div>
  <div class="nf__code"><em>404</em></div>
  <h1 class="nf__title">This page doesn't exist.</h1>
  <p class="nf__body">
    The link may be broken, or the page may have been moved. Head back home, or jump into the consulting hub.
  </p>
  <div class="nf__actions">
    <a href="/" class="nf__btn">Back to home</a>
    <a href="/consulting.html" class="nf__btn nf__btn--ghost">Open the hub</a>
  </div>
</main>

</body>
</html>
